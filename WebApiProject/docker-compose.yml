version: '3.8'
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_strong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql

  webapi:
    build: .
    depends_on:
      - mssql
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=mssql,1433;Database=WebApiDB;User Id=sa;Password=Your_strong!Passw0rd;TrustServerCertificate=True
    ports:
      - "5000:80"

volumes:
  mssqldata:
